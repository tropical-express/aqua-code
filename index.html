<!DOCTYPE html>
<html>
<head>
  <title>AquaCode</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #001f3f, #003f5f);
      font-family: sans-serif;
    }

    textarea {
      position: absolute;
      top: 40px;
      left: 40px;
      width: 80%;
      height: 75%;
      background: rgba(0,0,0,0.4);
      color: white;
      border: 1px solid #66ccff;
      border-radius: 10px;
      padding: 20px;
      font-size: 16px;
      resize: none;
      outline: none;
    }

    .bubble {
      position: absolute;
      bottom: -50px;
      width: 20px;
      height: 20px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: rise 10s linear infinite;
    }

    @keyframes rise {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(-110vh);
      }
    }
  </style>
</head>

<body>

  <textarea>
Welcome to AquaCode 🐠
  </textarea>

  <div class="bubble" style="left:10%; animation-delay:0s;"></div>
  <div class="bubble" style="left:30%; animation-delay:2s;"></div>
  <div class="bubble" style="left:60%; animation-delay:4s;"></div>
  <div class="bubble" style="left:80%; animation-delay:1s;"></div>

</body>
</html>
